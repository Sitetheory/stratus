name: Pull Request CI Checks

on:
  pull_request_target:
    types: [ opened, reopened, synchronize ]
    branches:
      - 'master'
  merge_group:
    types: [ checks_requested ]

permissions:
  checks: write
  contents: read
  pull-requests: write
  statuses: write

jobs:

  build-nodejs:

    name: build-nodejs (ubuntu-24.04, node-18.19.1)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18.19.1
        uses: actions/setup-node@v4
        with:
          node-version: 18.19.1
          cache: 'npm'
          cache-dependency-path: ./package-lock.json
      - name: Use npm 9.2.0
        run: npm install -g npm@9.2.0
      - run: npm ci --install-links=true
      - run: npm test
